<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="shortcut icon" href="https://openweathermap.org/img/wn/02d@4x.png" type="image/x-icon">
        <title>Weather App</title>
    </head>
    <body>
        <header>
            <h1>Weather App <img src="https://openweathermap.org/img/wn/02d@4x.png" alt="icon"></h1></header>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="France...">
                <button type="submit" onclick="showWeather()">Search</button>
            </div>
            
                    <div id="container">
                        <div id="msg"><h1>Wellcome ,  You Can Search About Weather Of Any City</h1>
                        </div>
                        <!--NOT FOUND MESSAGE 404-->
                        <h2 id="not-found-msg" style="display: none;">The City Not Found Check The Name And Try Again</h2>
                        <!--ERROR MESSAGE-->
                        <h2 id="error-internet">Error In The Internet! ,Please Try Again</h2>
            <!--SPINNER ANIMATION-->
                            <div id="spinner"></div>
            <div class="main-card" id="main-card">

                <div class="main-info">
                <!--left side-->
                <div class="left-side">
                <span id="city-name">--</span>
                <span id="date">--</span>
                <span id="temp">--</span>
                </div>
                <!--right side-->
                <div class="img-container">
                <img id="main-icon" src="" alt="no photo">
                </div>
                </div>
                <span id="description"></span>
                <!--START CARDS-->

                <div class="details">
                    <div class="cards">Humidity<span id="humidity">--</span></div>
                    <div class="cards">Wind<span id="wind">--</span></div>
                   <div class="cards">Pressure<span id="pressure">--</span></div>
                </div>
                <!--END OF CARDS-->
            </div>
        </div>
        <hr>
        <section id="section" style="display: none;">
            
            <h1 style="text-shadow: 0 0 5px black;">Weather Forecast For The Next Five Days</h1>
            <div id="forecastSkeleton" class="forecast-skeleton" style="display: none;">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
            <div id="days-container">
                <div id=""></div>
            </div>
        </section>


        <script src="script.js"></script>

        <footer>
            <p>Prowded By Amjad Khaled</p>
        </footer>
        
    </body>
</html>
